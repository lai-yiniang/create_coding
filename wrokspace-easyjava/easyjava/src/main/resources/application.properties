db.driver.name=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://localhost:3306/dome01?useUnicode=true&characterEncoding=utf8
db.username=root
db.password=123456
# 作者名称
author.comment=lai
# 忽略的属性
iqnore.bean.tojson.field=
iqnore.bean.tojson.expreesion=@JsonIgnore
iqnore.bean.tojson.class=import com.fasterxml.jackson.annotation.JsonIgnore;
# 日期格式序列化
bean.date.format.expreesion=@JsonFormat(pattern="%s",timezone="GMT+8")
bean.date.format.class=import com.fasterxml.jackson.annotation.JsonFormat;
# 日期格式反序列化
bean.date.parse.expreesion=@DateTimeFormat(pattern="%s")
bean.date.parse.class=import org.springframework.format.annotation.DateTimeFormat;
# 是否忽略表前缀
ignore.table.perfix=true
# 参数Bean后缀
suffix.bean.Query=Query
# Mapper后缀
suffix.mapper=Mapper
# 参数bean模糊查询后缀
suffix.bean.query.fuzzy=Fuzzy
# 参数日期起至
suffix.bean.query.time.start=StartTime
suffix.bean.query.time.end=EndTime
# 文件输出路径
path.base=E:/wrokspace-easyjava/easyjava-dome/src/main/
